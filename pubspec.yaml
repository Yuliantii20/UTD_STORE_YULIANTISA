name: utdstore_yulianti
description: "UTD Store - Yulianti (E-Commerce + Crypto App)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 🌐 Networking
  dio: ^5.4.0

  # 🔄 State Management
  flutter_bloc: ^8.1.3

  # 📦 Dependency Injection
  get_it: ^7.6.4

  # 🔀 Routing
  go_router: ^14.0.0

  # 💾 Local Database (Isar)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # 📡 WebSocket (Crypto)
  web_socket_channel: ^2.4.0

  # 📁 Path untuk Isar
  path_provider: ^2.1.2

  # 🎨 Icons default
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  isar_generator: ^3.1.0

flutter:
  uses-material-design: true